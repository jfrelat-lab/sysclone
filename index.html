<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sysclone WebVM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="sysclone-shell">
        <header>
            <h1>SYSCLONE <span>WebVM</span></h1>
        </header>
        
        <div id="sysclone-control-panel" class="toolbar">
            
            <div class="control-group">
                <select id="rom-selector">
                    <option value="nibbles.bas">Nibbles</option>
                    <option value="mandel.bas">Mandelbrot</option>
                    <option value="plasma.bas">Plasma</option>
                </select>
            </div>

            <div class="control-group cpu-controls">
                <label for="cpu-speed">
                    CPU: <span id="speed-display" class="highlight">40 cycles/frame</span> 
                </label>
                <input type="range" id="cpu-speed" min="5" max="200" step="5" value="40">
                
                <span class="separator">|</span>
                
                <input type="checkbox" id="cpu-turbo">
                <label for="cpu-turbo" class="danger">TURBO (MAX)</label>
            </div>

            <div class="control-group">
                <button id="btn-fullscreen">[ ] Fullscreen</button>
            </div>

        </div>

        <div id="screen-container">
            <canvas id="vga-display" width="640" height="400"></canvas>
        </div>
    </div>
    
    <script type="module" src="./src/webvm.js"></script>
</body>
</html>
